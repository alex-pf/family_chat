name: First_Deploy

# Запускается ТОЛЬКО вручную, один раз при первоначальной настройке нового сервера.
# После успешного выполнения используйте обычный workflow "Deploy FamilyChat".
#
# Требуемые GitHub Secrets:
#   VPS_IP               — IP сервера
#   VPS_SERVER_KEY       — приватный SSH-ключ для USER_NAME
#   USER_NAME            — имя deploy-пользователя (например: devuser)
#   SERVER_DOMAIN        — домен сервера (используется при сборке Flutter)
#   DB_PASSWORD          — пароль PostgreSQL
#   SERVICE_SECRET       — openssl rand -hex 32
#   EMAIL_PEPPER         — openssl rand -hex 32
#   JWT_PRIVATE_KEY      — openssl rand -hex 64
#   JWT_REFRESH_PEPPER   — openssl rand -hex 32
#
on:
  workflow_dispatch:
    inputs:
      server_domain:
        description: 'Домен сервера (например: chat.example.com)'
        required: true
        default: ''
      admin_email:
        description: 'Email первого администратора'
        required: true
        default: ''
      admin_password:
        description: 'Начальный пароль администратора (будет изменён при первом входе)'
        required: true
        default: ''

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

jobs:
  # ────────────────────────────────────────────────────────────────
  # Job 1: devuser — создание папок и конфигов
  # ────────────────────────────────────────────────────────────────
  setup-config:
    name: Setup Config (devuser)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Create directories and write configs
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.USER_NAME }}
          key: ${{ secrets.VPS_SERVER_KEY }}
          script: |
            set -e
            DOMAIN="${{ github.event.inputs.server_domain }}"

            echo "=== [1/3] Creating directories ==="
            mkdir -p ~/family_chat/config ~/family_chat/nginx ~/family_chat/migrations

            echo "=== [2/3] Writing production.yaml ==="
            cat > ~/family_chat/config/production.yaml << EOF
            apiServer:
              port: 8080
              publicHost: $DOMAIN
              publicPort: 443
              publicScheme: https

            insightsServer:
              port: 8081
              publicHost: $DOMAIN
              publicPort: 443
              publicScheme: https

            webServer:
              port: 8082
              publicHost: $DOMAIN
              publicPort: 443
              publicScheme: https

            database:
              host: db
              port: 5432
              name: family_chat_db
              user: family_chat_user
              requireSsl: false

            redis:
              enabled: false

            maxRequestSize: 25165824

            sessionLogs:
              consoleEnabled: true
            EOF

            echo "=== [3/3] Writing passwords.yaml ==="
            cat > ~/family_chat/config/passwords.yaml << 'YAML'
            production:
              database: '${{ secrets.DB_PASSWORD }}'
              serviceSecret: '${{ secrets.SERVICE_SECRET }}'
              emailSecretHashPepper: '${{ secrets.EMAIL_PEPPER }}'
              jwtHmacSha512PrivateKey: '${{ secrets.JWT_PRIVATE_KEY }}'
              jwtRefreshTokenHashPepper: '${{ secrets.JWT_REFRESH_PEPPER }}'
            YAML
            chmod 600 ~/family_chat/config/passwords.yaml

            echo "=== [4/4] Writing .env for docker compose ==="
            cat > ~/family_chat/.env << EOF
DB_PASSWORD=${{ secrets.DB_PASSWORD }}
ADMIN_EMAIL=${{ github.event.inputs.admin_email }}
ADMIN_INITIAL_PASSWORD=${{ github.event.inputs.admin_password }}
GITHUB_REPOSITORY=${{ github.repository }}
EOF
            chmod 600 ~/family_chat/.env

            echo "  => Config files written"

      - name: Copy nginx configs
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.USER_NAME }}
          key: ${{ secrets.VPS_SERVER_KEY }}
          source: "nginx/nginx.conf,nginx/nginx.ssl.conf"
          target: ~/family_chat/

      - name: Copy docker-compose.yml
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.USER_NAME }}
          key: ${{ secrets.VPS_SERVER_KEY }}
          source: "docker-compose.yml"
          target: ~/family_chat/

  # ────────────────────────────────────────────────────────────────
  # Job 3: Сборка Docker image и push в ghcr.io
  # ────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: docker build -t ghcr.io/${{ github.repository }}:latest .

      - name: Push Docker image
        run: docker push ghcr.io/${{ github.repository }}:latest

  # ────────────────────────────────────────────────────────────────
  # Job 4: Получить SSL-сертификат через certbot
  # ────────────────────────────────────────────────────────────────
  obtain-ssl:
    name: Obtain SSL Certificate
    runs-on: ubuntu-latest
    needs: setup-config
    steps:
      - name: Start nginx (HTTP only) and get certificate
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.USER_NAME }}
          key: ${{ secrets.VPS_SERVER_KEY }}
          script: |
            set -e
            DOMAIN="${{ github.event.inputs.server_domain }}"
            ADMIN_EMAIL="${{ github.event.inputs.admin_email }}"

            cd ~/family_chat

            echo "=== [1/3] Starting nginx (HTTP only for certbot challenge) ==="
            docker compose up -d nginx

            echo "=== [2/3] Obtaining SSL certificate ==="
            docker compose run --rm certbot certbot certonly \
              --webroot \
              --webroot-path=/var/www/certbot \
              --non-interactive \
              --agree-tos \
              --email "$ADMIN_EMAIL" \
              -d "$DOMAIN"

            echo "=== [3/3] Switching to SSL config ==="
            cp ~/family_chat/nginx/nginx.ssl.conf ~/family_chat/nginx/nginx.conf
            sed -i "s/DOMAIN_PLACEHOLDER/$DOMAIN/g" ~/family_chat/nginx/nginx.conf

            docker compose restart nginx
            echo "  => SSL certificate obtained for $DOMAIN"

  # ────────────────────────────────────────────────────────────────
  # Job 5: Полный запуск всего стека
  # ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy Full Stack
    runs-on: ubuntu-latest
    needs: [obtain-ssl, build-and-push]
    steps:
      - name: Deploy with docker compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.USER_NAME }}
          key: ${{ secrets.VPS_SERVER_KEY }}
          script: |
            set -e
            cd ~/family_chat

            echo "=== [1/3] Pulling and starting containers ==="
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d

            echo "=== [2/3] Verifying ==="
            sleep 10
            docker compose ps
            echo ""
            echo "=== App logs (last 50 lines) ==="
            docker compose logs app --tail=50

  # ────────────────────────────────────────────────────────────────
  # Job 6: Flutter Web → GitHub Pages (параллельно с deploy)
  # ────────────────────────────────────────────────────────────────
  first-flutter-deploy:
    name: Build & Deploy Flutter Web
    runs-on: ubuntu-latest
    needs: obtain-ssl
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'
          cache: true

      - name: Build Flutter Web (WASM)
        working-directory: family_chat_sp_flutter
        run: |
          flutter pub get
          flutter build web \
            --base-href /family_chat/ \
            --wasm \
            --dart-define=SERVER_URL=https://${{ github.event.inputs.server_domain }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: family_chat_sp_flutter/build/web

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment
