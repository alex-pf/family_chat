name: First Deploy — VPS Setup

# Запускается ТОЛЬКО вручную, один раз при первоначальной настройке нового сервера.
# После успешного выполнения используйте обычный workflow "Deploy FamilyChat".
on:
  workflow_dispatch:
    inputs:
      server_domain:
        description: 'Домен сервера (например: chat.example.com)'
        required: true
        default: ''
      admin_email:
        description: 'Email первого администратора'
        required: true
        default: ''
      admin_password:
        description: 'Начальный пароль администратора (будет изменён при первом входе)'
        required: true
        default: ''

jobs:
  # ────────────────────────────────────────────────────────────────
  # Шаг 1: Подготовка сервера (пакеты, PostgreSQL, папки, systemd)
  # ────────────────────────────────────────────────────────────────
  setup-vps:
    name: Setup VPS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install packages, create DB, configure systemd & nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: devuser
          key: ${{ secrets.VPS_SERVER_KEY }}
          script: |
            set -e
            DOMAIN="${{ github.event.inputs.server_domain }}"
            DEV_HOME="$HOME"

            echo "=== [1/6] Installing system packages ==="
            sudo apt-get update -qq
            sudo apt-get install -y -qq nginx postgresql postgresql-contrib certbot python3-certbot-nginx curl gnupg

            echo "=== [2/6] Configuring PostgreSQL ==="
            # Создать пользователя и БД (если ещё не существуют)
            sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='family_chat_user'" | grep -q 1 || \
              sudo -u postgres psql -c "CREATE USER family_chat_user WITH PASSWORD '${{ secrets.DB_PASSWORD }}';"
            sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname='family_chat_db'" | grep -q 1 || \
              sudo -u postgres psql -c "CREATE DATABASE family_chat_db OWNER family_chat_user;"
            sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE family_chat_db TO family_chat_user;"
            echo "  => PostgreSQL ready"

            echo "=== [3/6] Creating application directories ==="
            mkdir -p "$DEV_HOME/family_chat/config"
            mkdir -p "$DEV_HOME/family_chat/migrations"
            mkdir -p "$DEV_HOME/family_chat/data"

            echo "=== [4/6] Writing production.yaml ==="
            cat > "$DEV_HOME/family_chat/config/production.yaml" << EOF
            apiServer:
              port: 8080
              publicHost: $DOMAIN
              publicPort: 443
              publicScheme: https

            insightsServer:
              port: 8081
              publicHost: $DOMAIN
              publicPort: 443
              publicScheme: https

            webServer:
              port: 8082
              publicHost: $DOMAIN
              publicPort: 443
              publicScheme: https

            database:
              host: localhost
              port: 5432
              name: family_chat_db
              user: family_chat_user
              requireSsl: false

            redis:
              enabled: false

            maxRequestSize: 25165824

            sessionLogs:
              consoleEnabled: true
            EOF

            echo "=== [5/6] Creating systemd service ==="
            sudo tee /etc/systemd/system/family-chat.service > /dev/null << EOF
            [Unit]
            Description=FamilyChat Server (Serverpod)
            After=network.target postgresql.service
            Wants=postgresql.service

            [Service]
            Type=simple
            User=devuser
            WorkingDirectory=$DEV_HOME/family_chat
            ExecStart=$DEV_HOME/family_chat/family_chat_server_bin --mode production --apply-migrations
            Restart=always
            RestartSec=5
            StandardOutput=journal
            StandardError=journal
            SyslogIdentifier=family-chat
            Environment="ADMIN_EMAIL=${{ github.event.inputs.admin_email }}"
            Environment="ADMIN_INITIAL_PASSWORD=${{ github.event.inputs.admin_password }}"

            [Install]
            WantedBy=multi-user.target
            EOF

            # Разрешить devuser управлять сервисом без пароля
            echo "devuser ALL=(ALL) NOPASSWD: /bin/systemctl restart family-chat, /bin/systemctl start family-chat, /bin/systemctl stop family-chat, /bin/systemctl status family-chat, /bin/systemctl daemon-reload, /bin/systemctl reload nginx" \
              | sudo tee /etc/sudoers.d/devuser-family-chat > /dev/null
            sudo chmod 440 /etc/sudoers.d/devuser-family-chat

            sudo systemctl daemon-reload
            sudo systemctl enable family-chat
            echo "  => systemd service enabled"

            echo "=== [6/6] Configuring Nginx ==="
            sudo tee /etc/nginx/sites-available/family-chat > /dev/null << 'NGINX'
            map $http_upgrade $connection_upgrade {
                default upgrade;
                ''      close;
            }

            server {
                listen 80;
                server_name DOMAIN_PLACEHOLDER;
                return 301 https://$host$request_uri;
            }

            server {
                listen 443 ssl;
                server_name DOMAIN_PLACEHOLDER;

                ssl_certificate /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem;
                ssl_protocols TLSv1.2 TLSv1.3;
                ssl_ciphers HIGH:!aNULL:!MD5;
                ssl_prefer_server_ciphers on;
                ssl_session_cache shared:SSL:10m;
                ssl_session_timeout 10m;

                location / {
                    proxy_pass http://127.0.0.1:8080;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection $connection_upgrade;
                    proxy_set_header Host $proxy_host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_read_timeout 86400s;
                    proxy_send_timeout 86400s;
                    client_max_body_size 25m;
                    proxy_buffer_size 128k;
                    proxy_buffers 4 256k;
                    proxy_busy_buffers_size 256k;
                }
            }
            NGINX

            # Подставить реальный домен
            sudo sed -i "s/DOMAIN_PLACEHOLDER/$DOMAIN/g" /etc/nginx/sites-available/family-chat

            sudo rm -f /etc/nginx/sites-enabled/default
            sudo ln -sf /etc/nginx/sites-available/family-chat /etc/nginx/sites-enabled/family-chat
            sudo nginx -t
            echo "  => Nginx configured (SSL cert not yet obtained)"

  # ────────────────────────────────────────────────────────────────
  # Шаг 2: Получить SSL-сертификат через certbot (standalone)
  # ────────────────────────────────────────────────────────────────
  obtain-ssl:
    name: Obtain SSL Certificate
    runs-on: ubuntu-latest
    needs: setup-vps
    steps:
      - name: Get Let's Encrypt certificate
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: devuser
          key: ${{ secrets.VPS_SERVER_KEY }}
          script: |
            set -e
            DOMAIN="${{ github.event.inputs.server_domain }}"

            # Остановить nginx чтобы освободить порт 80 для certbot standalone
            sudo systemctl stop nginx

            sudo certbot certonly --standalone \
              --non-interactive \
              --agree-tos \
              --email "${{ github.event.inputs.admin_email }}" \
              -d "$DOMAIN"

            sudo systemctl start nginx
            sudo nginx -t && sudo systemctl reload nginx
            echo "  => SSL certificate obtained for $DOMAIN"

  # ────────────────────────────────────────────────────────────────
  # Шаг 3: Собрать и задеплоить сервер (первый раз)
  # ────────────────────────────────────────────────────────────────
  first-server-deploy:
    name: Build & Deploy Server
    runs-on: ubuntu-latest
    needs: obtain-ssl
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'
          cache: true

      - name: Compile Serverpod server
        working-directory: family_chat_sp_server
        run: |
          flutter pub get
          dart compile exe bin/main.dart -o family_chat_server_bin

      - name: Patch production.yaml with domain
        working-directory: family_chat_sp_server
        run: |
          sed -i "s/DOMAIN_PLACEHOLDER/${{ secrets.SERVER_DOMAIN }}/g" config/production.yaml

      - name: Write passwords.yaml on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: devuser
          key: ${{ secrets.VPS_SERVER_KEY }}
          script: |
            cat > ~/family_chat/config/passwords.yaml << 'YAML'
            production:
              database: '${{ secrets.DB_PASSWORD }}'
              serviceSecret: '${{ secrets.SERVICE_SECRET }}'
              emailSecretHashPepper: '${{ secrets.EMAIL_PEPPER }}'
              jwtHmacSha512PrivateKey: '${{ secrets.JWT_PRIVATE_KEY }}'
              jwtRefreshTokenHashPepper: '${{ secrets.JWT_REFRESH_PEPPER }}'
            YAML
            chmod 600 ~/family_chat/config/passwords.yaml

      - name: Copy binary & migrations to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: devuser
          key: ${{ secrets.VPS_SERVER_KEY }}
          source: >-
            family_chat_sp_server/family_chat_server_bin,
            family_chat_sp_server/config/production.yaml,
            family_chat_sp_server/migrations/
          target: ~/family_chat/
          strip_components: 1

      - name: Start server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: devuser
          key: ${{ secrets.VPS_SERVER_KEY }}
          script: |
            chmod +x ~/family_chat/family_chat_server_bin
            sudo systemctl start family-chat
            sleep 5
            sudo systemctl status family-chat --no-pager -l
            echo ""
            sudo journalctl -u family-chat -n 30 --no-pager

  # ────────────────────────────────────────────────────────────────
  # Шаг 4: Собрать и задеплоить Flutter Web (первый раз)
  # ────────────────────────────────────────────────────────────────
  first-flutter-deploy:
    name: Build & Deploy Flutter Web
    runs-on: ubuntu-latest
    needs: obtain-ssl
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'
          cache: true

      - name: Build Flutter Web (WASM)
        working-directory: family_chat_sp_flutter
        run: |
          flutter pub get
          flutter build web \
            --base-href /family_chat/ \
            --wasm \
            --dart-define=SERVER_URL=https://${{ github.event.inputs.server_domain }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: family_chat_sp_flutter/build/web

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment
