name: First Deploy — VPS Setup

# Запускается ТОЛЬКО вручную, один раз при первоначальной настройке нового сервера.
# После успешного выполнения используйте обычный workflow "Deploy FamilyChat".
#
# Требуемые GitHub Secrets:
#   VPS_IP               — IP сервера
#   VPS_SERVER_KEY       — приватный SSH-ключ (один для root и USER_NAME)
#   USER_NAME            — имя deploy-пользователя (например: devuser)
#   SERVER_DOMAIN        — домен сервера (используется при сборке Flutter)
#   DB_PASSWORD          — пароль PostgreSQL
#   SERVICE_SECRET       — openssl rand -hex 32
#   EMAIL_PEPPER         — openssl rand -hex 32
#   JWT_PRIVATE_KEY      — openssl rand -hex 64
#   JWT_REFRESH_PEPPER   — openssl rand -hex 32
#
on:
  workflow_dispatch:
    inputs:
      server_domain:
        description: 'Домен сервера (например: chat.example.com)'
        required: true
        default: ''
      admin_email:
        description: 'Email первого администратора'
        required: true
        default: ''
      admin_password:
        description: 'Начальный пароль администратора (будет изменён при первом входе)'
        required: true
        default: ''

jobs:
  # ────────────────────────────────────────────────────────────────
  # Шаг 1: root — установка пакетов, PostgreSQL, sudoers
  # Заходим как root, используя тот же ключ VPS_SERVER_KEY
  # (ключ должен быть прописан в /root/.ssh/authorized_keys)
  # ────────────────────────────────────────────────────────────────
  bootstrap-root:
    name: Bootstrap (root)
    runs-on: ubuntu-latest
    steps:
      - name: Install packages & configure PostgreSQL
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: root
          key: ${{ secrets.VPS_SERVER_KEY }}
          script: |
            set -e
            USER="${{ secrets.USER_NAME }}"
            USER_HOME=$(getent passwd "$USER" | cut -d: -f6)

            echo "=== [1/4] Installing system packages ==="
            apt-get update -qq
            apt-get install -y -qq \
              nginx postgresql postgresql-contrib \
              certbot python3-certbot-nginx \
              curl gnupg ufw

            echo "=== [2/4] Ensuring user $USER exists ==="
            id "$USER" &>/dev/null || useradd -m -s /bin/bash "$USER"
            USER_HOME=$(getent passwd "$USER" | cut -d: -f6)

            # Прописать тот же SSH-ключ для USER_NAME
            mkdir -p "$USER_HOME/.ssh"
            # Копируем authorized_keys из root (ключ уже там — он нас сюда пустил)
            cp /root/.ssh/authorized_keys "$USER_HOME/.ssh/authorized_keys"
            chmod 700 "$USER_HOME/.ssh"
            chmod 600 "$USER_HOME/.ssh/authorized_keys"
            chown -R "$USER:$USER" "$USER_HOME/.ssh"
            echo "  => SSH key copied to $USER"

            echo "=== [3/4] PostgreSQL ==="
            sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='family_chat_user'" | grep -q 1 || \
              sudo -u postgres psql -c "CREATE USER family_chat_user WITH PASSWORD '${{ secrets.DB_PASSWORD }}';"
            sudo -u postgres psql -c "ALTER USER family_chat_user WITH PASSWORD '${{ secrets.DB_PASSWORD }}';"
            sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname='family_chat_db'" | grep -q 1 || \
              sudo -u postgres psql -c "CREATE DATABASE family_chat_db OWNER family_chat_user;"
            sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE family_chat_db TO family_chat_user;"
            echo "  => PostgreSQL ready"

            echo "=== [4/4] Sudoers for $USER ==="
            echo "$USER ALL=(ALL) NOPASSWD: /bin/systemctl restart family-chat, /bin/systemctl start family-chat, /bin/systemctl stop family-chat, /bin/systemctl status family-chat, /bin/systemctl daemon-reload, /bin/systemctl reload nginx, /bin/systemctl stop nginx, /bin/systemctl start nginx, /usr/bin/certbot" \
              > /etc/sudoers.d/deploy-family-chat
            chmod 440 /etc/sudoers.d/deploy-family-chat

            echo "=== Firewall ==="
            ufw allow OpenSSH
            ufw allow 80/tcp
            ufw allow 443/tcp
            ufw --force enable
            echo "  => Done"

  # ────────────────────────────────────────────────────────────────
  # Шаг 2: USER_NAME — папки, production.yaml, systemd, nginx
  # ────────────────────────────────────────────────────────────────
  setup-vps:
    name: Setup VPS (app config)
    runs-on: ubuntu-latest
    needs: bootstrap-root
    steps:
      - name: Create directories, configs, systemd service & nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.USER_NAME }}
          key: ${{ secrets.VPS_SERVER_KEY }}
          script: |
            set -e
            DOMAIN="${{ github.event.inputs.server_domain }}"
            DEV_HOME="$HOME"
            USER="${{ secrets.USER_NAME }}"

            echo "=== [1/3] Creating application directories ==="
            mkdir -p "$DEV_HOME/family_chat/config"
            mkdir -p "$DEV_HOME/family_chat/migrations"
            mkdir -p "$DEV_HOME/family_chat/data"

            echo "=== [2/3] Writing production.yaml ==="
            cat > "$DEV_HOME/family_chat/config/production.yaml" << EOF
            apiServer:
              port: 8080
              publicHost: $DOMAIN
              publicPort: 443
              publicScheme: https

            insightsServer:
              port: 8081
              publicHost: $DOMAIN
              publicPort: 443
              publicScheme: https

            webServer:
              port: 8082
              publicHost: $DOMAIN
              publicPort: 443
              publicScheme: https

            database:
              host: localhost
              port: 5432
              name: family_chat_db
              user: family_chat_user
              requireSsl: false

            redis:
              enabled: false

            maxRequestSize: 25165824

            sessionLogs:
              consoleEnabled: true
            EOF

            echo "=== [3/3] Creating systemd service ==="
            sudo tee /etc/systemd/system/family-chat.service > /dev/null << EOF
            [Unit]
            Description=FamilyChat Server (Serverpod)
            After=network.target postgresql.service
            Wants=postgresql.service

            [Service]
            Type=simple
            User=$USER
            WorkingDirectory=$DEV_HOME/family_chat
            ExecStart=$DEV_HOME/family_chat/family_chat_server_bin --mode production --apply-migrations
            Restart=always
            RestartSec=5
            StandardOutput=journal
            StandardError=journal
            SyslogIdentifier=family-chat
            Environment="ADMIN_EMAIL=${{ github.event.inputs.admin_email }}"
            Environment="ADMIN_INITIAL_PASSWORD=${{ github.event.inputs.admin_password }}"

            [Install]
            WantedBy=multi-user.target
            EOF

            sudo systemctl daemon-reload
            sudo systemctl enable family-chat
            echo "  => systemd service enabled"

            echo "=== Configuring Nginx ==="
            sudo tee /etc/nginx/sites-available/family-chat > /dev/null << 'NGINX'
            map $http_upgrade $connection_upgrade {
                default upgrade;
                ''      close;
            }

            server {
                listen 80;
                server_name DOMAIN_PLACEHOLDER;
                return 301 https://$host$request_uri;
            }

            server {
                listen 443 ssl;
                server_name DOMAIN_PLACEHOLDER;

                ssl_certificate /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem;
                ssl_protocols TLSv1.2 TLSv1.3;
                ssl_ciphers HIGH:!aNULL:!MD5;
                ssl_prefer_server_ciphers on;
                ssl_session_cache shared:SSL:10m;
                ssl_session_timeout 10m;

                location / {
                    proxy_pass http://127.0.0.1:8080;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection $connection_upgrade;
                    proxy_set_header Host $proxy_host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_read_timeout 86400s;
                    proxy_send_timeout 86400s;
                    client_max_body_size 25m;
                    proxy_buffer_size 128k;
                    proxy_buffers 4 256k;
                    proxy_busy_buffers_size 256k;
                }
            }
            NGINX

            sudo sed -i "s/DOMAIN_PLACEHOLDER/$DOMAIN/g" /etc/nginx/sites-available/family-chat
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo ln -sf /etc/nginx/sites-available/family-chat /etc/nginx/sites-enabled/family-chat
            sudo nginx -t
            echo "  => Nginx configured (SSL not yet obtained)"

  # ────────────────────────────────────────────────────────────────
  # Шаг 3: Получить SSL-сертификат
  # ────────────────────────────────────────────────────────────────
  obtain-ssl:
    name: Obtain SSL Certificate
    runs-on: ubuntu-latest
    needs: setup-vps
    steps:
      - name: Get Let's Encrypt certificate
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.USER_NAME }}
          key: ${{ secrets.VPS_SERVER_KEY }}
          script: |
            set -e
            DOMAIN="${{ github.event.inputs.server_domain }}"
            ADMIN_EMAIL="${{ github.event.inputs.admin_email }}"

            sudo systemctl stop nginx
            sudo certbot certonly --standalone \
              --non-interactive \
              --agree-tos \
              --email "$ADMIN_EMAIL" \
              -d "$DOMAIN"
            sudo systemctl start nginx
            sudo nginx -t && sudo systemctl reload nginx
            echo "  => SSL certificate obtained for $DOMAIN"

  # ────────────────────────────────────────────────────────────────
  # Шаг 4a + 4b: Сборка сервера и Flutter — параллельно
  # ────────────────────────────────────────────────────────────────
  first-server-deploy:
    name: Build & Deploy Server
    runs-on: ubuntu-latest
    needs: obtain-ssl
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'
          cache: true

      - name: Compile Serverpod server
        working-directory: family_chat_sp_server
        run: |
          flutter pub get
          dart compile exe bin/main.dart -o family_chat_server_bin

      - name: Patch production.yaml with domain
        working-directory: family_chat_sp_server
        run: |
          sed -i "s/DOMAIN_PLACEHOLDER/${{ github.event.inputs.server_domain }}/g" config/production.yaml

      - name: Write passwords.yaml on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.USER_NAME }}
          key: ${{ secrets.VPS_SERVER_KEY }}
          script: |
            cat > ~/family_chat/config/passwords.yaml << 'YAML'
            production:
              database: '${{ secrets.DB_PASSWORD }}'
              serviceSecret: '${{ secrets.SERVICE_SECRET }}'
              emailSecretHashPepper: '${{ secrets.EMAIL_PEPPER }}'
              jwtHmacSha512PrivateKey: '${{ secrets.JWT_PRIVATE_KEY }}'
              jwtRefreshTokenHashPepper: '${{ secrets.JWT_REFRESH_PEPPER }}'
            YAML
            chmod 600 ~/family_chat/config/passwords.yaml

      - name: Copy binary, config & migrations to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.USER_NAME }}
          key: ${{ secrets.VPS_SERVER_KEY }}
          source: >-
            family_chat_sp_server/family_chat_server_bin,
            family_chat_sp_server/config/production.yaml,
            family_chat_sp_server/migrations/
          target: ~/family_chat/
          strip_components: 1

      - name: Start server & verify
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.USER_NAME }}
          key: ${{ secrets.VPS_SERVER_KEY }}
          script: |
            chmod +x ~/family_chat/family_chat_server_bin
            sudo systemctl start family-chat
            sleep 5
            sudo systemctl status family-chat --no-pager -l
            echo ""
            sudo journalctl -u family-chat -n 30 --no-pager

  first-flutter-deploy:
    name: Build & Deploy Flutter Web
    runs-on: ubuntu-latest
    needs: obtain-ssl
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'
          cache: true

      - name: Build Flutter Web (WASM)
        working-directory: family_chat_sp_flutter
        run: |
          flutter pub get
          flutter build web \
            --base-href /family_chat/ \
            --wasm \
            --dart-define=SERVER_URL=https://${{ github.event.inputs.server_domain }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: family_chat_sp_flutter/build/web

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment
