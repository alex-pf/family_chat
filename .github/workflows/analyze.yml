name: Analyze

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'
          cache: true

      - name: Install dependencies
        working-directory: family_chat_sp_server
        run: flutter pub get

      - name: Analyze
        working-directory: family_chat_sp_server
        run: flutter analyze --fatal-infos
