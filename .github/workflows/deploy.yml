name: Deploy FamilyChat

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "deploy"
  cancel-in-progress: false

jobs:
  # ────────────────────────────────────────────────────────────────
  # Job 1: Build Flutter Web → GitHub Pages
  # ────────────────────────────────────────────────────────────────
  deploy-flutter-web:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'
          cache: true

      - name: Build Flutter Web (WASM)
        working-directory: family_chat_sp_flutter
        run: |
          flutter pub get
          flutter build web \
            --base-href /family_chat/ \
            --wasm \
            --dart-define=SERVER_URL=https://${{ secrets.SERVER_DOMAIN }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: family_chat_sp_flutter/build/web

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment

  # ────────────────────────────────────────────────────────────────
  # Job 2: Build Dart Server → Deploy to VPS
  # ────────────────────────────────────────────────────────────────
  deploy-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'
          cache: true

      - name: Compile Serverpod server
        working-directory: family_chat_sp_server
        run: |
          flutter pub get
          dart compile exe bin/main.dart -o family_chat_server_bin

      - name: Patch production.yaml
        working-directory: family_chat_sp_server
        run: |
          grep -q "DOMAIN_PLACEHOLDER" config/production.yaml
          sed -i "s/DOMAIN_PLACEHOLDER/${{ secrets.SERVER_DOMAIN }}/g" config/production.yaml

      - name: Prepare folders on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: deploy
          key: ${{ secrets.VPS_SERVER_KEY }}
          script: |
            mkdir -p ~/family_chat/config
            mkdir -p ~/family_chat/migrations

      - name: Write passwords config on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: deploy
          key: ${{ secrets.VPS_SERVER_KEY }}
          script: |
            cat > ~/family_chat/config/passwords.yaml << 'YAML'
            production:
              database: '${{ secrets.DB_PASSWORD }}'
              serviceSecret: '${{ secrets.SERVICE_SECRET }}'
              emailSecretHashPepper: '${{ secrets.EMAIL_PEPPER }}'
              jwtHmacSha512PrivateKey: '${{ secrets.JWT_PRIVATE_KEY
