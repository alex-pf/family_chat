name: Deploy FamilyChat

# Запускается при каждом push в main или вручную.
# Предполагает, что сервер уже настроен через "First Deploy — Docker Setup".
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

concurrency:
  group: "deploy"
  cancel-in-progress: false

jobs:
  # ────────────────────────────────────────────────────────────────
  # Job 1: Build Flutter Web → GitHub Pages
  # ────────────────────────────────────────────────────────────────
  deploy-flutter-web:
    name: Flutter Web → GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'
          cache: true

      - name: Build Flutter Web (WASM)
        working-directory: family_chat_sp_flutter
        run: |
          flutter pub get
          flutter build web \
            --base-href /family_chat/ \
            --wasm \
            --dart-define=SERVER_URL=https://${{ secrets.SERVER_DOMAIN }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: family_chat_sp_flutter/build/web

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment

  # ────────────────────────────────────────────────────────────────
  # Job 2: Build Docker image → Push to ghcr.io → Deploy on VPS
  # ────────────────────────────────────────────────────────────────
  deploy-server:
    name: Serverpod Server → VPS (Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository }}:latest .
          docker push ghcr.io/${{ github.repository }}:latest

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.USER_NAME }}
          key: ${{ secrets.VPS_SERVER_KEY }}
          script: |
            set -e
            cd ~/family_chat

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans

            sleep 10
            docker compose ps
            echo ""
            echo "=== App logs (last 30 lines) ==="
            docker compose logs app --tail=30
