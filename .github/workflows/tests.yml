name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      VERSION: '3.4.6'
      SERVERPOD_PASSWORD_database: '3IcAI7Pbfp_o1oJV5XQZXESDp8UdCkok'
      SERVERPOD_PASSWORD_redis: 'z1mksT3pQhFVuwKVrc2IRaDZx6vCaF_z'

    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'

      - name: Start containers
        working-directory: family_chat_sp_server
        run: docker compose up --build -d

      - name: Install dependencies
        working-directory: family_chat_sp_server
        run: dart pub get

      - name: Install Serverpod CLI
        working-directory: family_chat_sp_server
        run: dart pub global activate serverpod_cli $VERSION

      - name: Run Serverpod generator
        working-directory: family_chat_sp_server
        run: serverpod generate

      - name: Run tests
        working-directory: family_chat_sp_server
        run: dart test

      - name: Stop containers
        if: always()
        working-directory: family_chat_sp_server
        run: docker compose down -v
