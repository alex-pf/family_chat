services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: family_chat_db
      POSTGRES_USER: family_chat_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U family_chat_user -d family_chat_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/${GITHUB_REPOSITORY}:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_INITIAL_PASSWORD=${ADMIN_INITIAL_PASSWORD}
    volumes:
      - ./config/production.yaml:/app/config/production.yaml:ro
      - ./config/passwords.yaml:/app/config/passwords.yaml:ro
      - ./migrations:/app/migrations:ro
    command: ["./family_chat_server_bin", "--mode", "production", "--apply-migrations"]

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot --webroot-path=/var/www/certbot --quiet; sleep 12h & wait $${!}; done"

volumes:
  postgres_data:
  certbot_www:
  certbot_certs:
