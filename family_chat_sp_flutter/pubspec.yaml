name: family_chat_sp_flutter
description: FamilyChat — семейный мессенджер на Serverpod.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '^3.8.0'
  flutter: '^3.32.0'

resolution: workspace

dependencies:
  cupertino_icons: ^1.0.5
  flutter:
    sdk: flutter
  family_chat_sp_client:
    path: ../family_chat_sp_client
  serverpod_flutter: 3.4.6
  serverpod_auth_idp_flutter: 3.4.6
  serverpod_auth_core_flutter: 3.4.6
  serverpod_auth_idp_client: 3.4.6
  google_fonts: ^6.2.1
  flutter_secure_storage: ^10.0.0
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  flutter_image_compress: ^2.3.0
  intl: ^0.20.0
  timeago: ^3.7.0

dev_dependencies:
  flutter_lints: '>=3.0.0 <7.0.0'
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/config.json

dependency_overrides:
  flutter_secure_storage: ^10.0.0
